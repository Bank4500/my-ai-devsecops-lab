# LLM Attack Detection Rules for Wazuh SIEM
# OWASP Top 10 for LLMs 2025
# Updated: keywords matched to actual attack log patterns

title: LLM Prompt Injection Detection
id: 100001
status: experimental
description: Detects prompt injection attempts targeting LLM applications
references:
  - https://owasp.org/www-project-top-10-for-large-language-model-applications/

# Detection patterns for LLM01 - Prompt Injection
detection_llm01:
  keywords:
    - "ignore previous"
    - "ignore all rules"
    - "DAN mode"
    - "bypass all restrictions"
    - "bypass"
    - "override"
    - "you are now"
    - "override safety"
    - "jailbreak"
    - "forget your instructions"
    - "disregard your programming"
    - "translate"
    - "roleplay"
    - "pretend"
  condition: keywords

# Detection patterns for LLM02 - Sensitive Information Disclosure
detection_llm02:
  keywords:
    - "show me the raw"
    - "reveal system prompt"
    - "print API key"
    - "display credentials"
    - "dump all data"
    - "for debugging"
    - "debugging"
    - "I am the developer"
    - "developer who built"
    - "as administrator"
    - "GOATS_DATA"
    - "secret"
    - "reveal"
    - "system prompt"
    - "API key"

# Detection patterns for LLM06 - Excessive Agency
detection_llm06:
  keywords:
    - "get_user_info"
    - "get info for user"
    - "run as admin"
    - "execute function"
    - "access user"
    - "show me information for user"
    - "vet record"
    - "check the vet"
    - "info for user3"

level: high
tags:
  - attack.initial_access
  - attack.t1190
  - owasp.llm01
  - owasp.llm02
  - owasp.llm06

falsepositives:
  - Legitimate security testing
  - Red team exercises

